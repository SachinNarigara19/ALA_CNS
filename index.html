<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMIU Dashboard - Sachin Narigara</title>

    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Poppins', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#059669',
                            dark: '#047857',
                        },
                        secondary: '#0D9488',
                        accent: '#2563EB',
                    },
                    animation: {
                        'blob': 'blob 10s infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply bg-white/70 backdrop-blur-2xl border border-white/20 shadow-[0_8px_32px_0_rgba(31,38,135,0.07)];
            }
            .glass-card {
                @apply bg-white/40 backdrop-blur-md border border-white/20 hover:bg-white/60 transition-all duration-300;
            }
            .text-glow {
                text-shadow: 0 0 20px rgba(79, 70, 229, 0.2);
            }
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .no-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        }

        body {
            @apply antialiased text-slate-900 overflow-hidden md:h-screen flex items-center justify-center p-4 md:p-6;
            background: radial-gradient(circle at top left, #f0fdf4 0%, #ffffff 100%);
        }

        @media (max-width: 768px) {
            body {
                @apply overflow-y-auto h-auto block py-10;
            }
        }
    </style>
</head>

<body>
    <!-- Animated Mesh Background Elements -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div
            class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-emerald-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob">
        </div>
        <div
            class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-teal-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute bottom-[-10%] left-[20%] w-[500px] h-[500px] bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000">
        </div>
    </div>

    <!-- Main Container -->
    <div
        class="glass w-full max-w-5xl rounded-[40px] p-8 md:p-12 flex flex-col justify-between relative z-10 animate-in fade-in slide-in-from-bottom-4 duration-1000 md:max-h-[92vh]">

        <!-- Top Logo Section -->
        <header class="flex flex-col items-center mb-8 px-4">
            <div class="relative group animate-float">
                <div
                    class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-[32px] blur opacity-20 group-hover:opacity-40 transition duration-1000">
                </div>
                <div
                    class="relative w-32 h-32 md:w-36 md:h-36 bg-white rounded-[32px] p-4 flex items-center justify-center shadow-xl border border-slate-100 overflow-hidden">
                    <img src="gmiu.png" alt="GMIU Logo"
                        class="w-full h-full object-contain filter group-hover:scale-110 transition-transform duration-500">
                </div>
            </div>

            <h1 class="mt-8 text-3xl md:text-5xl font-extrabold text-center tracking-tight text-slate-900 poppins">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600">
                    Gyanmanjari Innovative University
                </span>
            </h1>
        </header>

        <!-- Info Cards Grid -->
        <main
            class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-10 overflow-y-auto md:overflow-visible no-scrollbar">
            <!-- Developer Name -->
            <div class="glass-card rounded-3xl p-6 flex items-center gap-5 group hover:-translate-y-1">
                <div
                    class="w-14 h-14 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-colors duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Developer</p>
                    <p class="text-lg font-bold text-slate-800">Sachin Narigara</p>
                </div>
            </div>

            <!-- Enrollment Number -->
            <div class="glass-card rounded-3xl p-6 flex items-center gap-5 group hover:-translate-y-1">
                <div
                    class="w-14 h-14 rounded-2xl bg-emerald-50 flex items-center justify-center text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-colors duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z" />
                    </svg>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Enrollment No.</p>
                    <p class="text-lg font-bold text-slate-800">20230905090041</p>
                </div>
            </div>

            <!-- Subject -->
            <div class="glass-card rounded-3xl p-6 flex items-center gap-5 group hover:-translate-y-1">
                <div
                    class="w-14 h-14 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
                    </svg>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Subject Name</p>
                    <p class="text-lg font-bold text-slate-800">CNS</p>
                </div>
            </div>

            <!-- Subject Code -->
            <div class="glass-card rounded-3xl p-6 flex items-center gap-5 group hover:-translate-y-1">
                <div
                    class="w-14 h-14 rounded-2xl bg-amber-50 flex items-center justify-center text-amber-600 group-hover:bg-amber-600 group-hover:text-white transition-colors duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
                    </svg>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Subject Code</p>
                    <p class="text-lg font-bold text-slate-800">BETIT16326</p>
                </div>
            </div>
        </main>

        <!-- Action Buttons -->
        <div class="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8 mb-4">
            <a href="ala1.html"
                class="w-full md:w-44 group relative py-4 px-8 bg-gradient-to-br from-emerald-600 to-teal-600 text-white font-bold rounded-2xl shadow-lg shadow-emerald-200 hover:shadow-emerald-300 transform hover:-translate-y-1 transition-all duration-300 text-center">
                <span class="relative z-10">ALA 1</span>
                <div class="absolute inset-0 rounded-2xl bg-white opacity-0 group-hover:opacity-10 transition-opacity">
                </div>
            </a>
            <a href="ala2.html"
                class="w-full md:w-44 group relative py-4 px-8 bg-gradient-to-br from-teal-600 to-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-teal-200 hover:shadow-teal-300 transform hover:-translate-y-1 transition-all duration-300 text-center">
                <span class="relative z-10">ALA 2</span>
                <div class="absolute inset-0 rounded-2xl bg-white opacity-0 group-hover:opacity-10 transition-opacity">
                </div>
            </a>
            <a href="ala3.html"
                class="w-full md:w-44 group relative py-4 px-8 bg-gradient-to-br from-blue-600 to-cyan-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 hover:shadow-blue-300 transform hover:-translate-y-1 transition-all duration-300 text-center">
                <span class="relative z-10">ALA 3</span>
                <div class="absolute inset-0 rounded-2xl bg-white opacity-0 group-hover:opacity-10 transition-opacity">
                </div>
            </a>
        </div>


    </div>
</body>

</html>
